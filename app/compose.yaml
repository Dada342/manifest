services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: manifest-astro:latest
    container_name: manifest-astro
    ports:
      - "4321:4321"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "4321"
    user: "1001:1001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4321/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
